<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Service</title>

    <!--
      Umami analytics — DO NOT edit or remove.
      Same website ID across every junyounge service.
      If you add more .html pages, paste this same tag into each page's <head>.
      Filter by hostname in the Umami dashboard to see per-service stats.
    -->
    <script
      defer
      src="https://cloud.umami.is/script.js"
      data-website-id="b41bea97-777f-4a11-b890-e3c1174f30fd"
    ></script>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { color-scheme: dark; }
      body {
        min-height: 100dvh;
        display: flex; flex-direction: column; justify-content: center; gap: 1rem;
        max-width: 34rem; margin: 0 auto; padding: 2rem 1.5rem;
        font-family: ui-sans-serif, system-ui, -apple-system, "Apple SD Gothic Neo",
          "Noto Sans KR", sans-serif;
        background: #0b0b0c; color: #ededed; -webkit-font-smoothing: antialiased;
      }
      .eyebrow { font-size: .75rem; letter-spacing: .14em; text-transform: uppercase; color: #7a7a7d; }
      h1 { font-size: clamp(2rem, 6vw, 3rem); font-weight: 650; letter-spacing: -.02em; line-height: 1.05; }
      p.lede { font-size: 1.05rem; line-height: 1.6; color: #c4c4c7; }
      code { font-family: ui-monospace, Menlo, monospace; font-size: .85em; background: #1a1a1d; padding: .1em .4em; border-radius: 4px; }
    </style>
  </head>
  <body>
    <p class="eyebrow">junyounge · service template</p>
    <h1>Start building.</h1>
    <p class="lede">
      Analytics is already wired up. Replace this with your service — the visit
      to this page is already being tracked. Edit <code>index.html</code> to begin.
    </p>
  </body>
</html>
